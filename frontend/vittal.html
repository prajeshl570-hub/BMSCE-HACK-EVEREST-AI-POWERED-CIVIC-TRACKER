    },

    },

    {

    },

    {
        lat:12.9279,
        lng:77.6271,
        intensity:0.8
    }

    ];


    // MARKERS


    reports.forEach(report => {

        L.marker([report.lat, report.lng])

        .addTo(map)

        .bindPopup("Waste Report");

    });



// HEATMAP POINTS


const heatPoints = reports.map(r => [
    r.lat,
    r.lng,
    r.intensity
]);


// CREATE HEATMAP


const heat = L.heatLayer(heatPoints, {

    radius: 35,
    blur: 25,
    maxZoom: 17,

    gradient: {

        0.2: 'green',
        0.5: 'yellow',
        0.8: 'orange',
        1.0: 'red'

    }

}).addTo(map);

<body>

    <div class="map-panel">
        <h1>Smart Waste Map</h1>
        <p>Live civic reports around Bengaluru with severity-based heat intensity.</p>
        <span class="status-pill" id="mapStatus">Loading reports...</span>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

    <script>
        const map = L.map("map").setView([12.9716, 77.5946], 12);
        const statusPill = document.getElementById("mapStatus");

        L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
            attribution: "&copy; OpenStreetMap & CartoDB",
            subdomains: "abcd",
            maxZoom: 20
        }).addTo(map);

        const fallbackReports = [
            { lat: 12.9716, lng: 77.5946, severity: 3, category: "Garbage" },
            { lat: 12.9352, lng: 77.6245, severity: 2, category: "Pothole" },
            { lat: 12.9980, lng: 77.6762, severity: 3, category: "Waste" },
            { lat: 12.9279, lng: 77.6271, severity: 1, category: "Drainage" }
        ];

        let markers = [];
        const heat = L.heatLayer([], {
            radius: 28,
            blur: 18,
            maxZoom: 17,
            gradient: {
                0.35: "#38bdf8",
                0.65: "#facc15",
                1: "#ef4444"
            }
        }).addTo(map);

        function renderReports(reports) {
            markers.forEach(marker => marker.remove());
            markers = [];

            const heatPoints = reports.map(report => {
                const severity = Number(report.severity || report.intensity || 1);
                return [Number(report.lat), Number(report.lng), Math.min(severity / 3, 1)];
            });

            reports.forEach(report => {
                const marker = L.marker([Number(report.lat), Number(report.lng)])
                    .addTo(map)
                    .bindPopup(`${report.category || "Civic issue"}<br>Severity: ${report.severity || 1}`);
                markers.push(marker);
            });

            heat.setLatLngs(heatPoints);
        }

        async function refreshHeatmap() {
            try {
                const response = await fetch("http://127.0.0.1:8010/reports");
                if (!response.ok) {
                    throw new Error("Backend unavailable");
                }

                const reports = await response.json();
                renderReports(Array.isArray(reports) && reports.length ? reports : fallbackReports);
                statusPill.textContent = `Showing ${Array.isArray(reports) ? reports.length : 0} live reports`;
            } catch (error) {
                renderReports(fallbackReports);
                statusPill.textContent = "Demo data shown";
                console.log("API Error:", error);
            }
        }

        refreshHeatmap();
        setInterval(refreshHeatmap, 10000);
    </script>
    <script src="session.js?v=2"></script>
</body>
