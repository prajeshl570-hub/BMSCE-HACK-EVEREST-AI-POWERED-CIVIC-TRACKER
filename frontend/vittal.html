<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Residue Recon | Smart Waste Heatmap</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body { margin:0; padding:0; font-family: 'Segoe UI', sans-serif; }
        #map { height:100vh; width:100%; }

        .overlay-ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .title-card {
            background: white;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border-left: 5px solid #0b3d91;
        }

        .btn-back {
            background: #0b3d91;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .btn-back:hover { background: #1456c5; }
    </style>
</head>

<body>

<div class="overlay-ui">
    <div class="title-card">
        <i class="bi bi-geo-alt-fill text-danger"></i> Residue Recon: Live Heatmap
    </div>
    <a href="index.html" class="btn-back">
        <i class="bi bi-arrow-left"></i> Back to Dashboard
    </a>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<script>
    // --- SESSION CHECK ---
    if (!localStorage.getItem("user_name")) {
        window.location.href = "auth.html";
    }

    // --- INITIALIZE MAP ---
    const map = L.map('map', { zoomControl: false }).setView([12.9716, 77.5946], 12);
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap & CartoDB'
    }).addTo(map);

    // Initialize Empty Heat Layer
    const heat = L.heatLayer([], {
        radius: 35,
        blur: 15,
        maxZoom: 17,
        gradient: {
            0.2: 'blue',
            0.4: 'cyan',
            0.6: 'lime',
            0.8: 'yellow',
            1.0: 'red'
        }
    }).addTo(map);

    // Layer for discrete markers
    const markerLayer = L.layerGroup().addTo(map);

    // --- REFRESH DATA FROM BACKEND ---
    async function refreshData() {
        try {
            const response = await fetch("http://127.0.0.1:8000/get-locations");
            const data = await response.json();

            // 1. Update Heatmap: Transform objects to [lat, lng, intensity]
            const heatPoints = data.map(r => [
                parseFloat(r.lat), 
                parseFloat(r.lng), 
                0.8 // Default intensity
            ]);
            heat.setLatLngs(heatPoints);

            // 2. Update Markers
            markerLayer.clearLayers();
            data.forEach(report => {
                L.circleMarker([report.lat, report.lng], {
                    radius: 6,
                    fillColor: "#ff0000",
                    color: "#fff",
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 0.8
                })
                .addTo(markerLayer)
                .bindPopup(`<b>${report.category.toUpperCase()}</b><br>Reported by: ${report.user_name}`);
            });

            console.log(`Updated with ${data.length} records.`);
        } catch (error) {
            console.error("Sync Error:", error);
        }
    }

    // Initial Load
    refreshData();

    // Auto-sync every 10 seconds
    setInterval(refreshData, 10000);
</script>

</body>
</html>
